<VirtualHost *:80>
    ServerName v.sitename.org

    DocumentRoot /opt/media-watch-web/public

    <Directory /opt/media-watch-web/public>
        AllowOverride All
        Require all granted
    </Directory>

    SetEnv MEDIA_WATCH_BASE_URL https://v.sitename.org
    SetEnv MEDIA_WATCH_DB_PATH /opt/media-watch-web/var/media_watch.sqlite
    SetEnv MEDIA_WATCH_MEDIA_ROOTS /mnt/storage/Media/Video/Movie,/mnt/storage/Media/Video/Series
    SetEnv MEDIA_WATCH_SITE_NAME "Media Watch"

    ErrorLog ${APACHE_LOG_DIR}/media-watch-web-error.log
    CustomLog ${APACHE_LOG_DIR}/media-watch-web-access.log combined
</VirtualHost>

